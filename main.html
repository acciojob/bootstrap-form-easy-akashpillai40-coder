<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<!------------------Name--------------------->
<div class="mb-3 mt-5">
    <label for="first-name-input" class="form-label">First Name</label>
    <input type="text" class="form-control" id="first-name-input" aria-describedby="emailHelp" required >
	<div class="invalid-feedback">
        First name required.
    </div>
</div>
		<!------------------Last-Name--------------------->
<div class="mb-3">
    <label for="last-name-input" class="form-label">Last Name</label>
    <input type="text" class="form-control" id="last-name-input" aria-describedby="emailHelp" required>
	<div class="invalid-feedback">
        Last name required.
    </div>
</div>
		<!------------------Email--------------------->
		 <div class="mb-3">
    <label for="email-input" class="form-label">Email Address</label>
    <input type="email" class="form-control" id="email-input" aria-describedby="emailHelp" placeholder="xyz@abc.com" required>
			<div class="invalid-feedback">
              Email required .
           </div> 
  </div>
	<!------------------College--------------------->
<div class="mb-3">
    <label for="college-input" class="form-label">College</label>
    <input type="text" class="form-control" id="college-input" aria-describedby="emailHelp" required>
	<div class="invalid-feedback">
        Please provide a valid college.
    </div>
</div>
	<!------------------College year--------------------->
 
  <div class="mb-3">
                <label for="grad-year-select" class="form-label">Graduation Year</label>
                <select class="form-select" id="grad-year-select" required>
                    <option selected disabled value="">Choose...</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                </select>
	        <div class="invalid-feedback">
            Please choose a valid Graduation Year.
           </div>
</div>
		<!------------------Roll no--------------------->
<div class="mb-3">
    <label for="roll-no-input" class="form-label">Roll No.</label>
    <input type="text" class="form-control" id="roll-no-input" aria-describedby="emailHelp"  required>
	         <div class="invalid-feedback">
              Please provide a Roll no.
             </div>
</div>
		<!------------------Check_box--------------------->
		
<div class="mb-3 form-check">
	<input type="checkbox" class="form-check-input" id="conditions-checkbox" required>
    <label for="conditions-checkbox" class="form-check-label">Agree to terms and conditions</label>
	            <div class="invalid-feedback">
                You must agree before submitting.
                </div>
</div>
		
  <button type="submit" class="btn btn-primary">Submit form</button>
</form>

	<!------------------End......------>
    <script type="text/javascript" src="./script.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
